<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tiao — Request Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="header" id="site-header"></header>

  <section class="checkout">
    <div class="wrap">
      <nav class="crumb crumb--dark"><a href="index.html">Home</a><span>/</span><span>Request Order</span></nav>
      <h1 class="checkout__title">REQUEST ORDER</h1>
      <p class="checkout__lead">No payment now. Send us your selection — we’ll verify availability, confirm your order, and reply with payment &amp; delivery details.</p>

      <div class="checkout__grid">
        <div class="checkout__summary">
          <h3>Your selection</h3>
          <div id="summaryItems"></div>
          <div class="checkout__total"><span>Estimated total</span><strong id="summaryTotal">£0</strong></div>
        </div>

        <div class="checkout__pay">
          <h3>Your details</h3>
          <form id="requestForm" class="req-form">
            <label>Full name<input type="text" name="name" required autocomplete="name" /></label>
            <label>Email<input type="email" name="email" required autocomplete="email" /></label>
            <label>Phone / WhatsApp<input type="tel" name="phone" autocomplete="tel" placeholder="Optional" /></label>
            <label>Note<textarea name="note" rows="3" placeholder="Optional — sizing, questions, delivery notes"></textarea></label>
            <button type="submit" class="btn btn--solid btn--block" id="reqSubmit">SEND ORDER REQUEST</button>
          </form>
          <div id="reqMsg" class="checkout__msg" hidden></div>
          <p class="checkout__fine">By requesting you agree to tiao’s Terms. Nothing is charged until we confirm.</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer" id="site-footer"></footer>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="assets/js/config.js?v=4"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/request.js?v=4"></script>
</body>
</html>
