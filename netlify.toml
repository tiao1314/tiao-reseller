# Netlify config for tiao — serves the static site + serverless functions.
[build]
  publish = "."
  functions = "netlify/functions"

# Nice URLs: /api/create-order -> the function
[[redirects]]
  from = "/api/create-order"
  to = "/.netlify/functions/create-order"
  status = 200

[[redirects]]
  from = "/api/capture-order"
  to = "/.netlify/functions/capture-order"
  status = 200
