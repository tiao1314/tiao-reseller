<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tiao — Watches</title>
  <meta name="description" content="Authenticated luxury watches at tiao. Rolex, Audemars Piguet, Patek Philippe, Omega and Cartier — verified, full-set, fully authenticated." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="header" id="site-header"></header>

  <section class="page-hero">
    <img class="page-hero__bg" src="https://images.unsplash.com/photo-1587836374828-4dbafa94cf0e?auto=format&fit=crop&w=1400&q=80" alt="Watches" loading="eager" />
    <div class="wrap page-hero__inner">
      <nav class="crumb"><a href="index.html">Home</a><span>/</span><span>Watches</span></nav>
      <h1 class="page-hero__word">WATCHES</h1>
      <p class="page-hero__lede">Rolex, Audemars Piguet, Patek Philippe, Omega and Cartier — verified, full-set, fully authenticated.</p>
    </div>
  </section>

  <section class="catalog" id="catRoot" data-category="watches">
    <div class="wrap catalog__toolbar">
      <div class="js-filters chip-row"></div>
      <div class="catalog__meta">
        <span class="js-count muted"></span>
        <label class="sorter">Sort
          <select class="js-sort">
            <option value="featured">Featured</option>
            <option value="new">Newest</option>
            <option value="low">Price: Low to High</option>
            <option value="high">Price: High to Low</option>
          </select>
        </label>
      </div>
    </div>
    <div class="wrap product-grid js-grid"></div>
  </section>

  <footer class="footer" id="site-footer"></footer>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/category.js"></script>
</body>
</html>
