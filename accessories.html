<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tiao — Accessories</title>
  <meta name="description" content="Authenticated luxury accessories at tiao. Belts, sunglasses, wallets and scarves from the houses you love — the finishing touch, verified." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css?v=6" />
</head>
<body>
  <header class="header" id="site-header"></header>

  <section class="page-hero">
    <img class="page-hero__bg" src="https://images.unsplash.com/photo-1624222247344-550fb60583dc?auto=format&fit=crop&w=1400&q=80" alt="Accessories" loading="eager" />
    <div class="wrap page-hero__inner">
      <nav class="crumb"><a href="index.html">Home</a><span>/</span><span>Accessories</span></nav>
      <h1 class="page-hero__word">ACCESSORIES</h1>
      <p class="page-hero__lede">Belts, sunglasses, wallets and scarves from the houses you love — the finishing touch, verified.</p>
    </div>
  </section>

  <section class="catalog" id="catRoot" data-category="accessories">
    <div class="wrap catalog__toolbar">
      <div class="js-filters chip-row"></div>
      <div class="catalog__meta">
        <span class="js-count muted"></span>
        <label class="sorter">Sort
          <select class="js-sort">
            <option value="featured">Featured</option>
            <option value="new">Newest</option>
            <option value="low">Price: Low to High</option>
            <option value="high">Price: High to Low</option>
          </select>
        </label>
      </div>
    </div>
    <div class="wrap product-grid js-grid"></div>
  </section>

  <footer class="footer" id="site-footer"></footer>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="assets/js/config.js?v=6"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/auth.js?v=6"></script>
  <script src="assets/js/ui.js?v=7"></script>
  <script src="assets/js/category.js"></script>
</body>
</html>
