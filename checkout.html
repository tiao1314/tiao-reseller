<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tiao — Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="header" id="site-header"></header>

  <section class="checkout">
    <div class="wrap">
      <nav class="crumb crumb--dark"><a href="index.html">Home</a><span>/</span><span>Checkout</span></nav>
      <h1 class="checkout__title">CHECKOUT</h1>

      <div class="checkout__grid">
        <div class="checkout__summary">
          <h3>Order summary</h3>
          <div id="summaryItems"></div>
          <div class="checkout__total"><span>Total</span><strong id="summaryTotal">£0</strong></div>
        </div>

        <div class="checkout__pay">
          <h3>Pay securely</h3>
          <p class="checkout__note">Payments are processed by PayPal. You can pay with a PayPal account or any card.</p>
          <div id="paypal-buttons"></div>
          <div id="payMsg" class="checkout__msg" hidden></div>
          <p class="checkout__fine">By paying you agree to tiao’s Terms & Refund Policy. Every piece is authenticated before dispatch.</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer" id="site-footer"></footer>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/checkout.js"></script>
</body>
</html>
