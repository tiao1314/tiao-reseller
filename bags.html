<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpeg" href="assets/img/logo.jpg" />
  <title>dripdrip — Bags</title>
  <meta name="description" content="Authenticated luxury bags at dripdrip. Icons from Saint Laurent, Chanel, Off-White, Dior, Hermès and more — every piece authenticated and on hand." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

<body>
  <header class="header" id="site-header"></header>

  <section class="page-hero">
    <img class="page-hero__bg" src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?auto=format&fit=crop&w=1400&q=80" alt="Bags" loading="eager" />
    <div class="wrap page-hero__inner">
      <nav class="crumb"><a href="index.html">Home</a><span>/</span><span>Bags</span></nav>
      <h1 class="page-hero__word">BAGS</h1>
      <p class="page-hero__lede">Icons from Saint Laurent, Chanel, Off-White, Dior, Hermès and more — every piece authenticated and on hand.</p>
    </div>
  </section>

  <section class="catalog" id="catRoot" data-category="bags">
    <div class="wrap catalog__toolbar">
      <div class="js-filters filt-panel"></div>
      <div class="catalog__meta">
        <span class="js-count muted"></span>
        <label class="sorter">Sort
          <select class="js-sort">
            <option value="featured">Featured</option>
            <option value="new">Newest</option>
            <option value="low">Price: Low to High</option>
            <option value="high">Price: High to Low</option>
          </select>
        </label>
      </div>
    </div>
    <div class="wrap product-grid js-grid"></div>
  </section>

  <footer class="footer" id="site-footer"></footer>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="assets/js/config.js?v=6"></script>
  <script src="assets/js/data.js?v=3"></script>
  <script src="assets/js/catalog.js?v=9"></script>
  <script src="assets/js/store.js?v=5"></script>
